<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Redefinir Senha 🔐</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>🔐 Nova Senha</h1>
                <p>Digite sua nova senha</p>
            </div>

            <form id="reset-form">
                <input type="hidden" id="token" name="token">

                <div class="form-group">
                    <label for="password">Nova Senha</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Digite sua nova senha"
                        required
                        minlength="6"
                        autocomplete="new-password"
                    >
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirmar Senha</label>
                    <input 
                        type="password" 
                        id="confirm-password" 
                        name="confirm-password" 
                        placeholder="Digite novamente"
                        required
                        minlength="6"
                        autocomplete="new-password"
                    >
                </div>

                <button type="submit" class="btn-primary" id="submit-btn">
                    Redefinir Senha
                </button>
            </form>

            <div class="auth-footer">
                <a href="login.html">← Voltar para o login</a>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 10000;"></div>

    <script>
        const form = document.getElementById('reset-form');
        const submitBtn = document.getElementById('submit-btn');
        const tokenInput = document.getElementById('token');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirm-password');

        // Extrai o token da URL (ex: reset-password.html?token=abc123)
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            showToast('Token inválido ou expirado. Solicite um novo link.', 'error');
            setTimeout(() => {
                window.location.href = 'forgot-password.html';
            }, 3000);
        } else {
            tokenInput.value = token;
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = '';
            if (type === 'success') icon = '✅';
            else if (type === 'error') icon = '❌';
            else icon = 'ℹ️';

            toast.innerHTML = `
                <span style="font-size: 1.2em;">${icon}</span> 
                <span>${message}</span>
            `;
            
            toast.style.cssText = `
                display: flex;
                align-items: center;
                gap: 10px;
                background: ${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#3b82f6'};
                color: white;
                padding: 12px 20px;
                border-radius: 8px;
                margin-bottom: 10px;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                animation: slideIn 0.3s ease-out;
            `;
            
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s forwards';
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = passwordInput.value.trim();
            const confirmPassword = confirmPasswordInput.value.trim();

            if (!password || !confirmPassword) {
                showToast('Por favor, preencha todos os campos.', 'error');
                return;
            }

            if (password.length < 6) {
                showToast('A senha deve ter no mínimo 6 caracteres.', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showToast('As senhas não coincidem.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Redefinindo...';

            try {
                const response = await fetch('https://agenteia-1.onrender.com/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        token: tokenInput.value,
                        password 
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showToast('✅ Senha redefinida com sucesso!', 'success');
                    passwordInput.value = '';
                    confirmPasswordInput.value = '';
                    
                    setTimeout(() => {
                        showToast('Redirecionando para o login...', 'info');
                    }, 1500);

                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    showToast(data.message || 'Erro ao redefinir senha. Token inválido ou expirado.', 'error');
                    
                    if (response.status === 400 || response.status === 404) {
                        setTimeout(() => {
                            window.location.href = 'forgot-password.html';
                        }, 3000);
                    }
                }
            } catch (error) {
                console.error('Erro:', error);
                showToast('Erro de conexão. Verifique sua internet.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Redefinir Senha';
            }
        });
    </script>

    <style>
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateX(100%);
            }
        }
    </style>
</body>
</html>
