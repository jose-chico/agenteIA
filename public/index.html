<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suporte ao Cliente 💬</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="client-body">
    <audio id="notification-sound-client" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>
    
    <div id="chat-app">
        <header>
            <div>
                <strong>Atendimento 👋</strong>
                <div class="status">🟢 Online</div>
            </div>
            <span id="logout-btn" style="cursor:pointer">Sair</span>
        </header>

        <div id="chat-messages"></div>

        <div id="status-escrita-cliente"></div>

        <div class="input-area">
            <div class="emoji-bar" id="emoji-bar-client" style="display: none;">
                <!-- Emojis Básicos -->
                <span onclick="insertEmoji('😊')">😊</span>
                <span onclick="insertEmoji('😂')">😂</span>
                <span onclick="insertEmoji('😍')">😍</span>
                <span onclick="insertEmoji('👍')">👍</span>
                <span onclick="insertEmoji('❤️')">❤️</span>
                <span onclick="insertEmoji('✅')">✅</span>
                
                <!-- Mercado Financeiro -->
                <span onclick="insertEmoji('💰')">💰</span>
                <span onclick="insertEmoji('💵')">💵</span>
                <span onclick="insertEmoji('💶')">💶</span>
                <span onclick="insertEmoji('💷')">💷</span>
                <span onclick="insertEmoji('💸')">💸</span>
                <span onclick="insertEmoji('💳')">💳</span>
                <span onclick="insertEmoji('🪙')">🪙</span>
                <span onclick="insertEmoji('📈')">📈</span>
                <span onclick="insertEmoji('📉')">📉</span>
                <span onclick="insertEmoji('📊')">📊</span>
                <span onclick="insertEmoji('💹')">💹</span>
                <span onclick="insertEmoji('🏦')">🏦</span>
                <span onclick="insertEmoji('🏧')">🏧</span>
                <span onclick="insertEmoji('💼')">💼</span>
                <span onclick="insertEmoji('🧮')">🧮</span>
                <span onclick="insertEmoji('🎯')">🎯</span>
                <span onclick="insertEmoji('🔔')">🔔</span>
                <span onclick="insertEmoji('⚡')">⚡</span>
                <span onclick="insertEmoji('🚀')">🚀</span>
                <span onclick="insertEmoji('🐂')">🐂</span>
                <span onclick="insertEmoji('🐻')">🐻</span>
                <span onclick="insertEmoji('💎')">💎</span>
            </div>
            <div class="controls">
                <button class="emoji-toggle-btn" onclick="toggleEmojiPicker('client')" title="Emojis">😊</button>
                <input type="file" id="imageInputClient" accept="image/*" style="display: none;">
                <button class="attach-btn" onclick="document.getElementById('imageInputClient').click()">📎</button>
                <input type="text" id="messageInput" placeholder="Digite sua dúvida...">
                <button id="btnEnviar">✈️</button>
            </div>
        </div>
    </div>

    <!-- MODAL DE OPÇÕES DA MENSAGEM (GLOBAL) -->
    <div id="msg-options-modal" class="modal-overlay" style="display: none;" onclick="closeOptionsModal(event)">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px; text-align: center; color: var(--text-primary);">Opções da Mensagem</h3>
            <div id="modal-actions">
                <!-- Botões serão injetados via JS -->
            </div>
            <button class="msg-opt-btn cancel-global" onclick="closeOptionsModal()">
                <span class="icon">❌</span> Cancelar
            </button>
        </div>
    </div>

    <!-- MODAL DE CONFIRMAÇÃO (NOVO) -->
    <div id="confirm-modal" class="modal-overlay" style="display: none;" onclick="closeConfirmModal(event)">
        <div class="modal-content">
            <h3 style="margin-bottom: 10px; text-align: center; color: var(--text-primary);">Confirmação</h3>
            <p id="confirm-message" style="text-align: center; color: #b0bec5; margin-bottom: 20px;">Tem certeza?</p>
            <div style="display: flex; gap: 10px;">
                <button id="confirm-btn-yes" class="msg-opt-btn" style="background: #ef4444; justify-content: center; color: white;">Sim, apagar</button>
                <button onclick="closeConfirmModal()" class="msg-opt-btn" style="background: rgba(255,255,255,0.1); justify-content: center;">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toast-container"></div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
