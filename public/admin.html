<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Painel Admin 📊</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="admin-wrapper">
        <aside id="sidebar">
            <div id="sidebar-header">
                <h3>Admin Chat 👑</h3>
                <input type="text" id="searchClient" placeholder="🔍 Buscar cliente...">
            </div>
            <div class="client-list">
            </div>
        </aside>

        <main class="admin-main">
            <header>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <button id="back-to-list-btn" class="back-btn" style="display: none;">←</button>
                    <h2>Gerenciamento 📥</h2>
                </div>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div><strong>Admin:</strong> Francisco 👑</div>
                    <span id="logout-btn" class="logout-btn-header" style="cursor: pointer; color: #ef4444; font-size: 0.9rem;">🚪 Sair</span>
                </div>
            </header>

            <div id="admin-messages">
                <div class="empty-state">
                    <p>Selecione um cliente para conversar 👤</p>
                </div>
            </div>

            <div id="typing-status-admin"></div>

            <!-- Modo Broadcast -->
            <div class="broadcast-toggle-container">
                <label class="broadcast-toggle">
                    <input type="checkbox" id="broadcastMode">
                    <span class="toggle-slider"></span>
                    <span class="toggle-label">
                        <span class="icon">📢</span>
                        <span class="text">Enviar para TODOS os clientes</span>
                    </span>
                </label>
                <p class="broadcast-hint" id="broadcast-hint" style="display: none;">
                    ⚠️ A mensagem será enviada para todos os clientes ativos
                </p>
            </div>

            <div class="admin-input-area">
                <div class="emoji-bar" id="emoji-bar-admin" style="display: none;">
                    <!-- Emojis Básicos -->
                    <span onclick="insertEmojiAdmin('😊')">😊</span>
                    <span onclick="insertEmojiAdmin('😂')">😂</span>
                    <span onclick="insertEmojiAdmin('😍')">😍</span>
                    <span onclick="insertEmojiAdmin('👍')">👍</span>
                    <span onclick="insertEmojiAdmin('❤️')">❤️</span>
                    <span onclick="insertEmojiAdmin('✅')">✅</span>
                    
                    <!-- Mercado Financeiro -->
                    <span onclick="insertEmojiAdmin('💰')">💰</span>
                    <span onclick="insertEmojiAdmin('💵')">💵</span>
                    <span onclick="insertEmojiAdmin('💶')">💶</span>
                    <span onclick="insertEmojiAdmin('💷')">💷</span>
                    <span onclick="insertEmojiAdmin('💸')">💸</span>
                    <span onclick="insertEmojiAdmin('💳')">💳</span>
                    <span onclick="insertEmojiAdmin('🪙')">🪙</span>
                    <span onclick="insertEmojiAdmin('📈')">📈</span>
                    <span onclick="insertEmojiAdmin('📉')">📉</span>
                    <span onclick="insertEmojiAdmin('📊')">📊</span>
                    <span onclick="insertEmojiAdmin('💹')">💹</span>
                    <span onclick="insertEmojiAdmin('🏦')">🏦</span>
                    <span onclick="insertEmojiAdmin('🏧')">🏧</span>
                    <span onclick="insertEmojiAdmin('💼')">💼</span>
                    <span onclick="insertEmojiAdmin('🧮')">🧮</span>
                    <span onclick="insertEmojiAdmin('🎯')">🎯</span>
                    <span onclick="insertEmojiAdmin('🔔')">🔔</span>
                    <span onclick="insertEmojiAdmin('⚡')">⚡</span>
                    <span onclick="insertEmojiAdmin('🚀')">🚀</span>
                    <span onclick="insertEmojiAdmin('🐂')">🐂</span>
                    <span onclick="insertEmojiAdmin('🐻')">🐻</span>
                    <span onclick="insertEmojiAdmin('💎')">💎</span>
                </div>
                <div class="admin-controls">
                    <button class="emoji-toggle-btn" onclick="toggleEmojiPicker('admin')" title="Emojis">😊</button>
                    <input type="file" id="imageInputAdmin" accept="image/*" style="display: none;">
                    <button class="attach-btn attach-btn-admin" onclick="document.getElementById('imageInputAdmin').click()">📎</button>
                    <input type="text" id="adminReply" placeholder="Digite sua resposta...">
                    <button id="send-btn">Enviar</button>
                </div>
            </div>
        </main>
    </div>

    <div id="admin-msg-options-modal" class="modal-overlay" style="display: none;" onclick="closeAdminOptionsModal(event)">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px; text-align: center; color: var(--text-primary);">Opções da Mensagem</h3>
            <div id="admin-modal-actions"></div>
            <button class="msg-opt-btn cancel-global" onclick="closeAdminOptionsModal()">
                <span class="icon">❌</span> Cancelar
            </button>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="https://agenteia-1.onrender.com/socket.io/socket.io.js"></script>
    <script src="admin-script.js"></script>
</body>
</html>
