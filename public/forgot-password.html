<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Esqueci a Senha 🔑</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>🔑 Recuperar Senha</h1>
                <p>Digite seu e-mail para receber o link de redefinição</p>
            </div>

            <form id="forgot-form">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="seu@email.com"
                        required
                        autocomplete="email"
                    >
                </div>

                <button type="submit" class="btn-primary" id="submit-btn">
                    Enviar Link de Recuperação
                </button>
            </form>

            <div class="auth-footer">
                <a href="login.html">← Voltar para o login</a>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 10000;"></div>

    <script>
        const form = document.getElementById('forgot-form');
        const submitBtn = document.getElementById('submit-btn');
        const emailInput = document.getElementById('email');

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = '';
            if (type === 'success') icon = '✅';
            else if (type === 'error') icon = '❌';
            else icon = 'ℹ️';

            toast.innerHTML = `
                <span style="font-size: 1.2em;">${icon}</span> 
                <span>${message}</span>
            `;
            
            toast.style.cssText = `
                display: flex;
                align-items: center;
                gap: 10px;
                background: ${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#3b82f6'};
                color: white;
                padding: 12px 20px;
                border-radius: 8px;
                margin-bottom: 10px;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                animation: slideIn 0.3s ease-out;
            `;
            
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s forwards';
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();

            if (!email) {
                showToast('Por favor, digite seu e-mail.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Enviando...';

            try {
                const response = await fetch('https://agenteia-1.onrender.com/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    showToast('✅ E-mail enviado! Verifique sua caixa de entrada.', 'success');
                    emailInput.value = '';
                    
                    setTimeout(() => {
                        showToast('Você será redirecionado para o login em 3 segundos...', 'info');
                    }, 2000);

                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 5000);
                } else {
                    showToast(data.message || 'Erro ao enviar e-mail. Tente novamente.', 'error');
                }
            } catch (error) {
                console.error('Erro:', error);
                showToast('Erro de conexão. Verifique sua internet.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Enviar Link de Recuperação';
            }
        });
    </script>

    <style>
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateX(100%);
            }
        }
    </style>
</body>
</html>
